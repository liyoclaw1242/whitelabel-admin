name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dashboard typecheck
        run: pnpm --filter dashboard exec tsc --noEmit
      - name: OTel typecheck
        run: pnpm --filter @whitelabel/otel typecheck
      # @whitelabel/ui typecheck currently fails due to untracked shadcn
      # files (form, toast, toaster, revola, base-ui-tabs, use-toast).
      # Re-enable after Phase 0 (#110) cleanup.
      # - name: UI typecheck
      #   run: pnpm --filter @whitelabel/ui typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build dashboard
        run: pnpm --filter dashboard build
        # Build succeeds without BACKEND_URL — the /api/* rewrite is
        # simply skipped. Sentry source-map upload is gated on
        # SENTRY_AUTH_TOKEN being present (it is not, in CI, by design).

  go-test:
    name: go-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  migrate:
    name: migrate (prod)
    needs: [go-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - run: go run ./cmd/migrate up
        env:
          DATABASE_URL: ${{ secrets.NEON_PROD_URL }}

  migrate-preview:
    name: migrate (preview)
    needs: [go-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - run: go run ./cmd/migrate up
        env:
          DATABASE_URL: ${{ secrets.NEON_PREVIEW_URL }}
